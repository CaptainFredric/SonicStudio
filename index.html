      #boot-splash .ss-wave-glow {
        position: absolute;
        inset: -34px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(114, 217, 255, 0.22), rgba(114, 217, 255, 0) 70%);
        filter: blur(8px);
        animation: ss-boot-glow 2s ease-in-out infinite;
        pointer-events: none;
      }

      #boot-splash .ss-progress-track {
        width: 240px;
        height: 2px;
        border-radius: 2px;
        background: rgba(149, 169, 189, 0.10);
        overflow: hidden;
        position: relative;
      }

      #boot-splash .ss-progress-fill {
        position: absolute;
        inset: 0;
        width: 62%;
        background: rgba(114, 217, 255, 0.45);
        border-radius: 2px;
      }

      #boot-splash .ss-progress-shimmer {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, #72d9ff, transparent);
        animation: ss-boot-scan 1.4s linear infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-splash svg path { animation: none !important; }
        #boot-splash .ss-wave-glow { animation: none !important; opacity: 0.6; }
        #boot-splash .ss-progress-shimmer { animation: none !important; }

    <script>
      window.__ssFallbackToBuiltApp = function () {
        if (window.location.pathname.includes('/dist/')) {
          return;
        }

        const distUrl = new URL('./dist/', window.location.href);
        distUrl.search = window.location.search;
        distUrl.hash = window.location.hash;
        window.location.replace(distUrl.toString());
      };
    </script>
